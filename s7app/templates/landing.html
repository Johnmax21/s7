{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S7 — Cricket Card Game</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }

    /* ───────── Canvas Background ───────── */
    #canvas-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0; 
        pointer-events: none; /* Crucial: lets you hover the cards! */
    }

    /* Bring your UI to the front and make the background transparent */
    .hero-cards, .content {
        position: relative;
        z-index: 10;
    }
    
    html, body {
        height:100%;
        background:#05070a;
        font-family:'DM Sans', sans-serif;
        overflow-x:hidden;
    }

    .hero-cards {
        width:100%;
        display:flex;
        justify-content:center;
        padding:80px 20px;
        background: transparent !important; /* Overrides your #05070a solid background */
    }

    .container{
        position:relative;
        display:grid;
        grid-template-columns:repeat(5,1fr);
        gap:18px;
        width:min(1200px,90vw);
        height:540px;
        transition:.45s;
    }

    .container:hover .box{ filter:grayscale(1) brightness(.45); }

    .box{
        position:relative;
        background:var(--img) center center;
        background-size:cover;
        border-radius:28px;
        overflow:hidden;
        cursor:pointer;
        transition:.45s;
        display:flex;
        align-items:flex-end;
        justify-content:center;
        box-shadow: 0 25px 50px rgba(0,0,0,.45);
    }

    .box::before{
        content:"";
        position:absolute;
        inset:0;
        background: linear-gradient(to top, rgba(0,0,0,.75), transparent 55%);
    }

    .box:hover{
        filter:none;
        transform:translateY(-10px);
    }

    .container:has(.box-1:hover){ grid-template-columns:3fr 1fr 1fr 1fr 1fr; }
    .container:has(.box-2:hover){ grid-template-columns:1fr 3fr 1fr 1fr 1fr; }
    .container:has(.box-3:hover){ grid-template-columns:1fr 1fr 3fr 1fr 1fr; }
    .container:has(.box-4:hover){ grid-template-columns:1fr 1fr 1fr 3fr 1fr; }
    .container:has(.box-5:hover){ grid-template-columns:1fr 1fr 1fr 1fr 3fr; }

    .box:nth-child(odd){ transform:translateY(-18px); }
    .box:nth-child(even){ transform:translateY(18px); }
    .box:hover{ transform:translateY(-8px); }

    .box::after{
        content:attr(data-text);
        position:absolute;
        left:30px;
        bottom:28px;
        color:white;
        font-size:28px;
        font-weight:700;
        letter-spacing:2px;
        text-transform:uppercase;
        opacity:0;
        transform:translateY(40px);
        transition:.4s;
    }

    .box:hover::after{
        opacity:1;
        transform:translateY(0);
        transition-delay:.25s;
    }

    @media(max-width:900px){
        .container{ width:92vw; height:420px; }
        .box::after{ font-size:18px; }
    }

    @media(max-width:700px){
        .container{ grid-template-columns:1fr; height:auto; }
        .container:hover .box{ filter:none; }
        .box{ height:250px; transform:none !important; }
        .container:has(.box:hover){ grid-template-columns:1fr; }
    }

    /* ───────── Below-the-fold content ───────── */
    .content {
        max-width:760px;
        margin:0 auto;
        padding:80px 24px 120px;
        text-align:center;
        color:#fff;
    }
 
    .eyebrow {
        font-size:12px;
        letter-spacing:0.18em;
        text-transform:uppercase;
        color:#4ade80;
        font-weight:600;
        margin-bottom:18px;
    }
 
    .headline {
        font-family:'Space Grotesk', sans-serif;
        font-size:clamp(32px, 6vw, 56px);
        font-weight:700;
        line-height:1.08;
        margin-bottom:20px;
        letter-spacing:-0.02em;
    }
 
    .headline span { color:#4ade80; }
 
    .subhead {
        font-size:16px;
        color:#9ca3af;
        line-height:1.6;
        max-width:520px;
        margin:0 auto 36px;
    }
 
    .cta-row {
        display:flex;
        gap:14px;
        justify-content:center;
        flex-wrap:wrap;
    }
 
    .btn-primary, .btn-secondary {
        padding:14px 28px;
        border-radius:12px;
        font-size:15px;
        font-weight:600;
        text-decoration:none;
        display:inline-block;
        transition:transform .15s ease, opacity .15s ease;
    }
    .btn-primary { background:#4ade80; color:#06150d; }
    .btn-secondary {
        background:rgba(255,255,255,0.06);
        border:1px solid rgba(255,255,255,0.14);
        color:#fff;
    }
    .btn-primary:hover, .btn-secondary:hover { transform:translateY(-2px); }
</style>
</head>
<body>

<div id="canvas-bg"></div>

<section class="hero-cards">
    <div class="container">
        <div class="box box-1"
             style="--img:url('{% static 'poster/layer1.png' %}')"
             data-text="Batting">
        </div>
        <div class="box box-2"
             style="--img:url('{% static 'poster/layer2.png' %}')"
             data-text="Bowling">
        </div>
        <div class="box box-3"
             style="--img:url('{% static 'poster/layer3.png' %}')"
             data-text="Boost">
        </div>
        <div class="box box-4"
             style="--img:url('{% static 'poster/layer4.png' %}')"
             data-text="Legends">
        </div>
        <div class="box box-5"
             style="--img:url('{% static 'poster/layer5.png' %}')"
             data-text="Arena">
        </div>
    </div>
</section>

<div class="content">
    <p class="eyebrow">Multiplayer · Card Strategy · Live</p>
    <h1 class="headline">Pick your 7.<br>Outplay them <span>card by card</span>.</h1>
    <p class="subhead">
        S7 is a real-time multiplayer cricket card game — draft your deck,
        time your boosts, and chase the target one round at a time.
    </p>
    <div class="cta-row">
        <a href="/decks/" class="btn-primary">Play Now</a>
        <a href="#" class="btn-secondary">How It Works</a>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. Configuration 
    const config = {
        count: 300,
        magnetRadius: 10,
        ringRadius: 7,
        waveSpeed: 0.4,
        waveAmplitude: 1,
        particleSize: 1.5,
        lerpSpeed: 0.05,
        color: '#4ade80', // S7 Neon Green
        autoAnimate: true,
        particleVariance: 1,
        rotationSpeed: 0,
        depthFactor: 1,
        pulseSpeed: 3,
        fieldStrength: 10
    };

    // 2. Setup Scene, Camera, Renderer
    const container = document.getElementById('canvas-bg');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 50;

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // 3. Setup Particles & Instanced Mesh
    const geometry = new THREE.CapsuleGeometry(0.1, 0.4, 4, 8);
    const material = new THREE.MeshBasicMaterial({ color: config.color });
    const mesh = new THREE.InstancedMesh(geometry, material, config.count);
    scene.add(mesh);

    const dummy = new THREE.Object3D();
    const particles = [];
    
    let vWidth, vHeight;
    function updateViewport() {
        vHeight = 2 * Math.tan((camera.fov * Math.PI) / 360) * camera.position.z;
        vWidth = vHeight * camera.aspect;
    }
    updateViewport();

    for (let i = 0; i < config.count; i++) {
        const x = (Math.random() - 0.5) * 100;
        const y = (Math.random() - 0.5) * 100;
        const z = (Math.random() - 0.5) * 20;
        particles.push({
            t: Math.random() * 100,
            speed: 0.01 + Math.random() / 200,
            mx: x, my: y, mz: z,
            cx: x, cy: y, cz: z,
            randomRadiusOffset: (Math.random() - 0.5) * 2
        });
    }

    // 4. Mouse Tracking
    const pointer = { x: 0, y: 0 };
    const virtualMouse = { x: 0, y: 0 };
    const lastMousePos = { x: 0, y: 0 };
    let lastMouseMoveTime = 0;

    document.addEventListener('mousemove', (event) => {
        pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
        pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
        lastMouseMoveTime = Date.now();
        lastMousePos.x = pointer.x;
        lastMousePos.y = pointer.y;
    });

    // 5. Animation Loop
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const time = clock.getElapsedTime();
        
        let destX = (pointer.x * vWidth) / 2;
        let destY = (pointer.y * vHeight) / 2;

        if (config.autoAnimate && Date.now() - lastMouseMoveTime > 2000) {
            destX = Math.sin(time * 0.5) * (vWidth / 4);
            destY = Math.cos(time * 0.5 * 2) * (vHeight / 4);
        }

        virtualMouse.x += (destX - virtualMouse.x) * 0.05;
        virtualMouse.y += (destY - virtualMouse.y) * 0.05;

        const globalRotation = time * config.rotationSpeed;

        particles.forEach((p, i) => {
            p.t += p.speed / 2;

            const projectionFactor = 1 - p.cz / 50;
            const projectedTargetX = virtualMouse.x * projectionFactor;
            const projectedTargetY = virtualMouse.y * projectionFactor;

            const dx = p.mx - projectedTargetX;
            const dy = p.my - projectedTargetY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            let targetPos = { x: p.mx, y: p.my, z: p.mz * config.depthFactor };

            if (dist < config.magnetRadius) {
                const angle = Math.atan2(dy, dx) + globalRotation;
                const wave = Math.sin(p.t * config.waveSpeed + angle) * (0.5 * config.waveAmplitude);
                const deviation = p.randomRadiusOffset * (5 / (config.fieldStrength + 0.1));
                const currentRingRadius = config.ringRadius + wave + deviation;

                targetPos.x = projectedTargetX + currentRingRadius * Math.cos(angle);
                targetPos.y = projectedTargetY + currentRingRadius * Math.sin(angle);
                targetPos.z = p.mz * config.depthFactor + Math.sin(p.t) * (1 * config.waveAmplitude * config.depthFactor);
            }

            p.cx += (targetPos.x - p.cx) * config.lerpSpeed;
            p.cy += (targetPos.y - p.cy) * config.lerpSpeed;
            p.cz += (targetPos.z - p.cz) * config.lerpSpeed;

            dummy.position.set(p.cx, p.cy, p.cz);
            dummy.lookAt(projectedTargetX, projectedTargetY, p.cz);
            dummy.rotateX(Math.PI / 2);

            const currentDistToMouse = Math.sqrt(Math.pow(p.cx - projectedTargetX, 2) + Math.pow(p.cy - projectedTargetY, 2));
            const distFromRing = Math.abs(currentDistToMouse - config.ringRadius);
            let scaleFactor = Math.max(0, Math.min(1, 1 - distFromRing / 10));

            const finalScale = scaleFactor * (0.8 + Math.sin(p.t * config.pulseSpeed) * 0.2 * config.particleVariance) * config.particleSize;
            dummy.scale.set(finalScale, finalScale, finalScale);
            
            dummy.updateMatrix();
            mesh.setMatrixAt(i, dummy.matrix);
        });

        mesh.instanceMatrix.needsUpdate = true;
        renderer.render(scene, camera);
    }
    
    animate();

    // 6. Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        updateViewport();
    });
</script>
</body>
</html>
