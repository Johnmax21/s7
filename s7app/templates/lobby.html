<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S7 – Join Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: #0a1a0a;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(34,197,94,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(34,197,94,0.05) 0%, transparent 50%);
            display: flex; align-items: center; justify-content: center;
        }
        h1 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
        .glass {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
        }
        .divider {
            display: flex; align-items: center; gap: 12px;
            color: rgba(255,255,255,0.25); font-size: 13px; margin: 28px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
        }
        input[type="text"] {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: white;
            padding: 12px 16px;
            font-size: 16px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.25); text-transform: none; letter-spacing: 0; }
        input[type="text"]:focus { border-color: rgba(34,197,94,0.5); }
        .btn-primary {
            width: 100%; padding: 13px;
            background: #16a34a; color: white;
            border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background: #15803d; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-outline {
            width: 100%; padding: 13px;
            background: transparent; color: #4ade80;
            border: 1px solid #16a34a; border-radius: 10px;
            font-size: 15px; font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-outline:hover { background: rgba(22,163,74,0.1); }
        .badge {
            display: inline-block;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #4ade80; font-size: 12px; font-weight: 500;
            padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
        }
        .alert-error {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5; border-radius: 8px; padding: 10px 14px;
            font-size: 14px; margin-bottom: 16px;
        }
        .cricket-dots {
            position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
        }
        .dot {
            position: absolute; border-radius: 50%;
            background: rgba(34,197,94,0.15);
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="cricket-dots" aria-hidden="true">
        <div class="dot" style="width:8px;height:8px;left:15%;animation-duration:12s;animation-delay:0s"></div>
        <div class="dot" style="width:5px;height:5px;left:40%;animation-duration:18s;animation-delay:3s"></div>
        <div class="dot" style="width:10px;height:10px;left:70%;animation-duration:14s;animation-delay:6s"></div>
        <div class="dot" style="width:6px;height:6px;left:85%;animation-duration:20s;animation-delay:1s"></div>
    </div>

    <div class="glass p-10 w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <div class="badge">🏏 Multiplayer</div>
            <h1 class="text-5xl text-white mb-1">S7</h1>
            <p class="text-sm text-gray-400">Cricket Card Game</p>
        </div>

        {% if error %}
            <div class="alert-error">{{ error }}</div>
        {% endif %}

        {% if messages %}
            {% for msg in messages %}
                <div class="alert-error">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <!-- Create Room -->
        <form method="post" action="{% url 'create_room' %}">
            {% csrf_token %}
            <button type="submit" class="btn-primary">+ Create New Room</button>
        </form>

        <div class="divider">or join existing</div>

        <!-- Join Room -->
        <form method="post" action="{% url 'join_room' %}">
            {% csrf_token %}
            <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Room Code</label>
            <input type="text" name="code" maxlength="8" placeholder="Enter 6-letter code" autocomplete="off" required>
            <button type="submit" class="btn-outline mt-3">Join Room →</button>
        </form>

        <p class="text-center text-xs text-gray-600 mt-8">
            Share the room code with your opponent to play together
        </p>
    </div>
</body>
</html>
